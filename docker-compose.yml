version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://stonescan:stonescan@db:5432/stonescan?sslmode=disable
      - OBJECT_STORAGE_ENDPOINT=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin
    depends_on:
      - db
      - minio

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stonescan
      POSTGRES_PASSWORD: stonescan
      POSTGRES_DB: stonescan
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  db-data:
  minio-data:
