stages:
  fetch_data:
    cmd: python scripts/fetch_data.py
    deps:
      - scripts/fetch_data.py
    params:
      - data
    outs:
      - data/raw/mvtec_ad

  train:
    cmd: python scripts/train.py
    deps:
      - scripts/train.py
      - src/stonescan_ml/training/anomaly.py
      - src/stonescan_ml/config.py
      - data/raw/mvtec_ad
    params:
      - data
      - train
    outs:
      - models/checkpoints
    metrics:
      - reports/train_metrics.json:
          cache: false

  evaluate:
    cmd: python scripts/evaluate.py
    deps:
      - scripts/evaluate.py
      - src/stonescan_ml/evaluation/metrics.py
      - models/checkpoints
    params:
      - evaluate
    metrics:
      - reports/eval_report.json:
          cache: false

  export:
    cmd: python scripts/export.py
    deps:
      - scripts/export.py
      - models/checkpoints
    params:
      - export
    outs:
      - serving
